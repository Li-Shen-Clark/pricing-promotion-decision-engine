[pytest]
testpaths    = tests
python_files = test_*.py
addopts      = -ra --strict-markers --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    real_data: tests that read parquet/csv artifacts from data/processed
    snapshot:  regression tests pinned to current pipeline output (update on intentional change)
